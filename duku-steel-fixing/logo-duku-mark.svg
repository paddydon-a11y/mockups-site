<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 150" width="140" height="150" role="img" aria-label="Duku steel fixing rebar D mark">
  <defs>
    <!-- cylindrical steel sheen -->
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#EEF2F5"/>
      <stop offset="0.30" stop-color="#BFC8CF"/>
      <stop offset="0.62" stop-color="#8B959D"/>
      <stop offset="1"    stop-color="#59626A"/>
    </linearGradient>
    <!-- left-edge highlight to round the bar -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="0.18" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.82" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#2b3137" stop-opacity="0.55"/>
    </linearGradient>
    <!-- diagonal reinforcing ribs -->
    <pattern id="ribs" width="11" height="11" patternUnits="userSpaceOnUse">
      <line x1="-2" y1="11" x2="11" y2="-2" stroke="#2E353B" stroke-width="3" opacity="0.32"/>
      <line x1="-2" y1="14" x2="14" y2="-2" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
    </pattern>
    <mask id="dmask">
      <path d="M42,25 L42,125 M42,25 C112,23 112,127 42,125"
            fill="none" stroke="#fff" stroke-width="24"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>

  <!-- dark edge / drop for crisp rim -->
  <path d="M42,25 L42,125 M42,25 C112,23 112,127 42,125"
        fill="none" stroke="#363D43" stroke-width="27"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- steel body + ribs + sheen, clipped to the D -->
  <g mask="url(#dmask)">
    <rect x="26" y="10" width="104" height="132" fill="url(#steel)"/>
    <rect x="26" y="10" width="104" height="132" fill="url(#ribs)"/>
    <rect x="26" y="10" width="104" height="132" fill="url(#sheen)"/>
  </g>

  <!-- safety-orange tie wire wrapping the bar (steel-fixer's knot) -->
  <g stroke="#FF6A1A" stroke-width="3.4" stroke-linecap="round" fill="none">
    <path d="M30,46 C38,40 46,52 54,46"/>
    <path d="M30,52 C38,58 46,46 54,52"/>
    <path d="M51,46 l4,-3 M51,52 l4,3" stroke-width="2.6"/>
  </g>
</svg>
