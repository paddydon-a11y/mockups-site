<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 170" width="560" height="170" role="img" aria-label="Duku Ltd — Steel Fixing (for dark backgrounds)">
  <defs>
    <linearGradient id="steeld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F7F9"/><stop offset="0.30" stop-color="#C7D0D7"/>
      <stop offset="0.62" stop-color="#95A0A8"/><stop offset="1" stop-color="#646E76"/>
    </linearGradient>
    <linearGradient id="sheend" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0.7"/><stop offset="0.18" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.82" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#10151a" stop-opacity="0.6"/>
    </linearGradient>
    <pattern id="ribsd" width="11" height="11" patternUnits="userSpaceOnUse">
      <line x1="-2" y1="11" x2="11" y2="-2" stroke="#1b2024" stroke-width="3" opacity="0.40"/>
      <line x1="-2" y1="14" x2="14" y2="-2" stroke="#fff" stroke-width="1.2" opacity="0.22"/>
    </pattern>
    <mask id="dmaskd">
      <path d="M42,25 L42,125 M42,25 C112,23 112,127 42,125" fill="none" stroke="#fff"
            stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>

  <g transform="translate(8,12)">
    <path d="M42,25 L42,125 M42,25 C112,23 112,127 42,125" fill="none" stroke="#0d1115"
          stroke-width="27" stroke-linecap="round" stroke-linejoin="round"/>
    <g mask="url(#dmaskd)">
      <rect x="26" y="10" width="104" height="132" fill="url(#steeld)"/>
      <rect x="26" y="10" width="104" height="132" fill="url(#ribsd)"/>
      <rect x="26" y="10" width="104" height="132" fill="url(#sheend)"/>
    </g>
    <g stroke="#FF6A1A" stroke-width="3.4" stroke-linecap="round" fill="none">
      <path d="M30,46 C38,40 46,52 54,46"/><path d="M30,52 C38,58 46,46 54,52"/>
      <path d="M51,46 l4,-3 M51,52 l4,3" stroke-width="2.6"/>
    </g>
  </g>

  <text x="178" y="96" font-family="Anton, 'Arial Black', Impact, sans-serif"
        font-size="78" letter-spacing="3" fill="#F4F7F9">DUKU</text>
  <rect x="180" y="110" width="232" height="5" fill="#FF6A1A"/>
  <text x="182" y="140" font-family="Oswald, 'Arial Narrow', Arial, sans-serif" font-weight="600"
        font-size="21" letter-spacing="11" fill="#AEB8C0">STEEL FIXING</text>
</svg>
