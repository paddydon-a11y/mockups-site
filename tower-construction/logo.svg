<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72" role="img" aria-label="Tower Construction">
  <!-- tower mark -->
  <g>
    <!-- crenellated top -->
    <rect x="10" y="12" width="7" height="8" fill="#b08b4f"/>
    <rect x="22" y="12" width="7" height="8" fill="#b08b4f"/>
    <rect x="34" y="12" width="7" height="8" fill="#b08b4f"/>
    <!-- body -->
    <rect x="9" y="20" width="33" height="44" rx="1.5" fill="#1f4034"/>
    <!-- windows -->
    <rect x="15" y="27" width="8" height="10" rx="1" fill="#f1f3f1"/>
    <rect x="28" y="27" width="8" height="10" rx="1" fill="#f1f3f1"/>
    <rect x="15" y="43" width="8" height="10" rx="1" fill="#f1f3f1"/>
    <rect x="28" y="43" width="8" height="10" rx="1" fill="#f1f3f1"/>
    <!-- base -->
    <rect x="5" y="62" width="41" height="4" rx="1" fill="#15201b"/>
  </g>
  <!-- wordmark -->
  <text x="62" y="38" font-family="'Plus Jakarta Sans', 'Arial Black', Arial, sans-serif" font-weight="800" font-size="30" letter-spacing="-1" fill="#15201b">TOWER</text>
  <text x="63" y="57" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="13.5" letter-spacing="6.5" fill="#7d8a83">CONSTRUCTION</text>
</svg>
