<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="TH Carpentry and Joinery">
  <defs>
    <linearGradient id="th-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11402a"/>
      <stop offset="1" stop-color="#0a2417"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="196" fill="url(#th-g)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#00bf63" stroke-width="3" opacity="0.5"/>
  <!-- plane-iron / bar motif above the monogram -->
  <rect x="120" y="120" width="160" height="12" rx="6" fill="#00bf63"/>
  <!-- TH monogram, dead centre -->
  <text x="200" y="262" text-anchor="middle" font-family="Newsreader, Georgia, 'Times New Roman', serif" font-weight="600" font-size="184" letter-spacing="-6" fill="#f3f8f4">TH</text>
  <!-- accent rule below -->
  <rect x="150" y="288" width="100" height="6" rx="3" fill="#00bf63" opacity="0.85"/>
</svg>
